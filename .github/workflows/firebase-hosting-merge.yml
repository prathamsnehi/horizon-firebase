# Initially generated by the Firebase CLI, customized to build the Vite app
# in /frontend and deploy only when the frontend changes.
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "firebase.json"
      - ".github/workflows/firebase-hosting-merge.yml"
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: horizon-sidequests
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FUNCTIONS_REGION: us-central1
          VITE_USE_MOCK: "false"
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        env:
          # Route around flaky IPv6 paths to googleapis that cause
          # intermittent "Premature close" errors on GitHub runners.
          NODE_OPTIONS: --dns-result-order=ipv4first
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HORIZON_SIDEQUESTS }}
          channelId: live
          projectId: horizon-sidequests
          firebaseToolsVersion: "14.6.0"
