# Builds the Vite app in /frontend and deploys it to the live Firebase
# Hosting channel. Uses the Firebase CLI directly (with retries) instead of
# action-hosting-deploy, which fails hard on transient "Premature close"
# network drops to googleapis.
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "firebase.json"
      - ".github/workflows/firebase-hosting-merge.yml"
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: horizon-sidequests
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FUNCTIONS_REGION: us-central1
          VITE_USE_MOCK: "false"
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
      - name: Install Firebase CLI
        run: npm install -g firebase-tools@14
      - name: Write service account credentials
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HORIZON_SIDEQUESTS }}
        run: printf '%s' "$SA_JSON" > "${RUNNER_TEMP}/gcp-sa.json"
      - name: Deploy to Firebase Hosting (live)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 20
          command: firebase deploy --only hosting --project horizon-sidequests --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
          # Route around flaky IPv6 paths to googleapis that cause
          # intermittent "Premature close" errors on GitHub runners.
          NODE_OPTIONS: --dns-result-order=ipv4first
      - name: Clean up credentials
        if: always()
        run: rm -f "${RUNNER_TEMP}/gcp-sa.json"
