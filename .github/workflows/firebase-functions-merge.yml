name: Deploy Firebase Functions on merge
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: functions/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: functions

      # Fail fast on type errors before touching the cloud. `firebase deploy`
      # also runs this via the predeploy hook, but doing it here surfaces
      # compile errors as a distinct, earlier CI step.
      - name: Build
        run: yarn build
        working-directory: functions

      # Reuses the same service-account secret as the hosting workflow. NOTE:
      # that SA must be granted functions-deploy roles (see repo docs) or this
      # step's deploy will fail with permission errors.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HORIZON_SIDEQUESTS }}

      # Debug: confirm the auth step actually produced a credentials file and
      # that GOOGLE_APPLICATION_CREDENTIALS points at it. If the path prints
      # empty or the file is missing, the auth handoff (not IAM) is the problem.
      - name: Debug creds
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: |
          echo "output path: '${{ steps.auth.outputs.credentials_file_path }}'"
          echo "env var:     '$GOOGLE_APPLICATION_CREDENTIALS'"
          ls -l "$GOOGLE_APPLICATION_CREDENTIALS" || echo "FILE MISSING/UNSET"

      # Point the Firebase CLI at the service-account key the auth step wrote.
      # Passing the path explicitly (rather than relying on the action's global
      # export) is what the CLI reliably reads for non-interactive auth.
      - name: Deploy functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: npx firebase-tools@14 deploy --only functions --project horizon-sidequests --non-interactive --force
