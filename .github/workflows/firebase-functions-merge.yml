name: Deploy Firebase Functions on merge
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"

jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: functions/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: functions

      # Fail fast on type errors before touching the cloud. `firebase deploy`
      # also runs this via the predeploy hook, but doing it here surfaces
      # compile errors as a distinct, earlier CI step.
      - name: Build
        run: yarn build
        working-directory: functions

      # Reuses the same service-account secret as the hosting workflow. NOTE:
      # that SA must be granted functions-deploy roles (see repo docs) or this
      # step's deploy will fail with permission errors.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HORIZON_SIDEQUESTS }}

      - name: Deploy functions
        run: npx firebase-tools@14 deploy --only functions --project horizon-sidequests --non-interactive --force
